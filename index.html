<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tripoupa Elite — Travel Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* MANTÉM O TEU CSS IGUAL - Vou focar na funcionalidade abaixo */
        :root { --primary: #3b82f6; --bg-dark: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-dim: #94a3b8; --accent: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; }
        nav { padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); position: fixed; width: 100%; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 10px; cursor: pointer;}
        .logo i { color: var(--primary); }
        .hero { padding: 180px 5% 100px; text-align: center; }
        .search-container { max-width: 1000px; margin: 0 auto; background: var(--card-bg); padding: 2rem; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; text-align: left; }
        .input-group label { font-size: 0.8rem; color: var(--text-dim); }
        .input-group input { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; border-radius: 12px; color: white; outline: none; }
        .search-btn { background: var(--primary); color: white; border: none; padding: 1.2rem; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; grid-column: 1 / -1; margin-top: 10px;}
        .search-btn:hover { background: #2563eb; transform: translateY(-2px); }
        .section { padding: 80px 5%; max-width: 1200px; margin: 0 auto; }
        .dest-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .dest-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .ai-wrap { background: #1e293b; padding: 40px; border-radius: 24px; margin: 50px 5%; text-align: center; border: 1px solid var(--primary); }
        .ai-input-container { display: flex; gap: 10px; margin-top: 20px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; }
        .ai-input-container input { flex: 1; background: transparent; border: none; color: white; outline: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="window.location.reload()"><i class="fa-solid fa-bolt-lightning"></i> TRIP<span>OUPA</span></div>
    </nav>

    <section class="hero">
        <h1>Travel <span>Expertly</span>.</h1>
        <div class="search-container">
            <div class="search-grid">
                <div class="input-group">
                    <label>Destino</label>
                    <input type="text" id="main-destination" placeholder="Ex: Londres, Tokyo...">
                </div>
                <div class="input-group">
                    <label>Data de Ida</label>
                    <input type="date" id="main-date">
                </div>
                <button class="search-btn" onclick="executeAdvancedSearch()">
                    <i class="fa-solid fa-magnifying-glass"></i> PESQUISAR AGORA
                </button>
            </div>
        </div>
    </section>

    <section class="section" id="deals">
        <h2>Trending Destinations</h2>
        <div class="dest-grid">
            <div class="dest-card" onclick="quickBook('Maldivas')">
                <div style="height:200px; background: url('https://images.unsplash.com/photo-1514282401047-d79a71a590e8?w=400') center/cover;"></div>
                <div style="padding:20px;"><h3>Maldivas</h3><p>Click to see live prices</p></div>
            </div>
            <div class="dest-card" onclick="quickBook('Bali')">
                <div style="height:200px; background: url('https://images.unsplash.com/photo-1537996194471-e657df975ab4?w=400') center/cover;"></div>
                <div style="padding:20px;"><h3>Bali</h3><p>Click to see live prices</p></div>
            </div>
        </div>
    </section>

    <div class="ai-wrap">
        <h2>AI Assistant</h2>
        <div id="ai-msg" style="margin-bottom:20px;">Para onde queres ir hoje?</div>
        <div class="ai-input-container">
            <input type="text" id="ai-query" placeholder="Ex: Quero ir para Paris...">
            <button class="search-btn" style="width:auto; margin:0; padding: 10px 20px;" onclick="askAI()">Enviar</button>
        </div>
    </div>

    <script>
        // ESTA É A FUNÇÃO QUE ENVIA OS DADOS PARA O TRIP.COM
        function executeAdvancedSearch() {
            const dest = document.getElementById('main-destination').value;
            const date = document.getElementById('main-date').value; // Formato YYYY-MM-DD

            if (!dest) {
                alert("Por favor, escolhe um destino!");
                return;
            }

            // Se não houver data, o Trip.com usa a data de hoje por defeito
            let url = `https://www.trip.com/hotels/list?searchText=${encodeURIComponent(dest)}`;
            
            if (date) {
                url += `&checkIn=${date}`;
            }

            alert("🤖 Tripoupa AI: A configurar pesquisa para " + dest);
            window.open(url, '_blank');
        }

        function quickBook(city) {
            const url = `https://www.trip.com/hotels/list?searchText=${encodeURIComponent(city)}`;
            window.open(url, '_blank');
        }

        function askAI() {
            const query = document.getElementById('ai-query').value;
            const msgBox = document.getElementById('ai-msg');
            if(!query) return;

            msgBox.innerHTML = "🤖 A analisar o teu pedido...";
            
            setTimeout(() => {
                // Remove palavras comuns para ficar só o destino
                const cleanDest = query.replace(/quero ir para|ir para|viagem para/gi, "").trim();
                msgBox.innerHTML = `🤖 Encontrei opções para ${cleanDest}! <button onclick="quickBook('${cleanDest}')" style="background:var(--accent); border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Ver Agora</button>`;
            }, 1500);
        }
    </script>
</body>
</html>
